services:
  sigtools-db:
    image: mysql:8.0
    container_name: SIGplatform-sigtools-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${LOCAL_SIGTOOLS_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${LOCAL_SIGTOOLS_DB_NAME:-sigtools_beta}
      MYSQL_USER: ${LOCAL_SIGTOOLS_DB_USER:-sigtools_user}
      MYSQL_PASSWORD: ${LOCAL_SIGTOOLS_DB_PASSWORD:-sigtools_pass}
    ports:
      - "${LOCAL_SIGTOOLS_DB_PORT:-3307}:3306"
    volumes:
      - sigtools_db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${LOCAL_SIGTOOLS_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sigtools_db_data:

services:
  redis:
    image: redis:7-alpine
    container_name: SIGplatform-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: SIGplatform-web
    # Port 8000 is NOT exposed to the host — nginx handles external traffic
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: [
      "gunicorn", "config.asgi:application",
      "--bind", "0.0.0.0:8000",
      "--workers", "4",
      "-k", "uvicorn.workers.UvicornWorker",
      "--timeout", "0",
      "--access-logfile", "-",
      "--error-logfile", "-"
    ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: SIGplatform-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  poller:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: SIGplatform-poller
    env_file:
      - ../.env
    environment:
      - DJANGO_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - REALTIME_POLL_INTERVAL=5
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true
    command: ["python", "manage.py", "run_realtime_poller"]

volumes:
  # User-uploaded media (indoor floor-plan maps). Shared rw by web, ro by nginx.
  media_data:

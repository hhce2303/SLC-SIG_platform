# ─────────────────────────────────────────────────────────────
#  SIG Platform — Local Production Mirror overlay
#
#  Turns the local stack into an identical mirror of production:
#  a single pinned MariaDB 10.11 container hosting the three live
#  databases (sig_dailylogs, slc_schedules, sigtools_beta) and
#  pointing web + poller at it. Django settings stay at
#  DJANGO_ENV=production / DEBUG=False for true parity.
#
#  Seed the databases by dropping production dumps into
#  docker/init-db/ (see docs/LOCAL_MIRROR.md). They import on the
#  FIRST container start, in filename order, after
#  00_init_databases.sql creates the DBs and the app user.
#
#  Usage:
#    docker compose -f docker/docker-compose.yml \
#                   -f docker/docker-compose.local.yml up -d
#
#  DO NOT use as a standalone file. DO NOT commit DB volume data.
# ─────────────────────────────────────────────────────────────

x-mirror-db-env: &mirror-db-env
  # Single local user with access to all three mirrored databases.
  # Overrides the per-DB prod credentials from ../.env.
  DB_HOST: mirror-db
  DB_PORT: "3306"
  DB_NAME: sig_dailylogs
  DB_USER: ${MIRROR_DB_USER:-mirror}
  DB_PASSWORD: ${MIRROR_DB_PASSWORD:-mirror}

  SCHEDULES_DB_HOST: mirror-db
  SCHEDULES_DB_PORT: "3306"
  SCHEDULES_DB_NAME: slc_schedules
  SCHEDULES_DB_USER: ${MIRROR_DB_USER:-mirror}
  SCHEDULES_DB_PASSWORD: ${MIRROR_DB_PASSWORD:-mirror}

  SIGTOOLS_DB_HOST: mirror-db
  SIGTOOLS_DB_PORT: "3306"
  SIGTOOLS_DB_NAME: sigtools_beta
  SIGTOOLS_DB_USER: ${MIRROR_DB_USER:-mirror}
  SIGTOOLS_DB_PASSWORD: ${MIRROR_DB_PASSWORD:-mirror}
  SIGTOOLS_COOKIE_DOMAIN: ""   # host-only cookie — funciona por localhost, 127.0.0.1 o IP LAN

services:

  # ── Local MySQL mirror — hosts all 3 production databases ─────
  mirror-db:
    image: mariadb:10.11              # pinned — matches production (temporarily MariaDB 10.11; reverts to MySQL later)
    container_name: SIGplatform-mirror-db
    restart: unless-stopped
    # Large prod dumps contain multi-MB extended INSERTs; the 16M default
    # max_allowed_packet aborts the import ("Server has gone away"). Raise it
    # for both the init import and runtime.
    command: ["--max-allowed-packet=512M"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MIRROR_DB_ROOT_PASSWORD:-rootpass}
      MIRROR_DB_USER:      ${MIRROR_DB_USER:-mirror}
      MIRROR_DB_PASSWORD:  ${MIRROR_DB_PASSWORD:-mirror}
    ports:
      - "${MIRROR_DB_PORT:-3310}:3306"     # host 3310 → avoids clashing with 3306/3307/3308
    volumes:
      - mirror_db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Force TCP so "healthy" means the NETWORK listener is up — during the
      # init dump import MariaDB answers on the socket but skips networking,
      # which would otherwise mark it healthy prematurely and let web start
      # before the DB accepts TCP connections.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=tcp", "-u", "root", "-p${MIRROR_DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 600s    # full dump import (sigtools ~220MB) on first boot can take many minutes

  # ── web points at the local mirror for all three DBs ──────────
  web:
    depends_on:
      mirror-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *mirror-db-env

  # ── poller likewise ───────────────────────────────────────────
  poller:
    depends_on:
      mirror-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *mirror-db-env

volumes:
  mirror_db_data:

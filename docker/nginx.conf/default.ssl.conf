# Production HTTPS gateway for api.sig.systems.
# Selected by setting NGINX_CONF=default.ssl.conf (see docker-compose.ssl.yml).
# Local/dev keeps using the plain default.conf (HTTP only) — this file is prod.

upstream django {
    server web:8000;
}

# ── HTTP (port 80) ──────────────────────────────────────────────────────────
# Serves the Let's Encrypt ACME challenge; redirects everything else to HTTPS.
server {
    listen 80;
    server_name api.sig.systems _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.sig.systems _;

    ssl_certificate     /etc/letsencrypt/live/api.sig.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sig.systems/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;  # admite uploads de planos indoor

    # Media — archivos subidos (planos indoor)
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — incluye SSE/streaming sin buffering
    location /api/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400;
    }

    # Auth
    location /web-auth/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

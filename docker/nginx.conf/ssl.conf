# ─────────────────────────────────────────────────────────────
#  nginx — HTTPS config for the LOCAL PRODUCTION MIRROR.
#
#  Mirrors production's TLS termination so the app runs with its
#  real production settings (SESSION_COOKIE_SECURE / CSRF_COOKIE_SECURE
#  / HSTS), which only work over HTTPS. Mounted in place of
#  default.conf by docker-compose.ssl.yml.
#
#  Cert: self-signed for localhost (docker/certs/). See docs/LOCAL_MIRROR.md.
# ─────────────────────────────────────────────────────────────

upstream django {
    server web:8000;
}

# HTTP → HTTPS redirect (parity with prod; HSTS requires HTTPS)
server {
    listen 80;
    server_name api.sig.systems localhost _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.sig.systems localhost _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50M;   # uploads de planos indoor

    # Media — archivos subidos, servidos desde el volumen media_data
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — SSE/streaming sin buffering
    location /api/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400;
    }

    # Auth
    location /web-auth/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

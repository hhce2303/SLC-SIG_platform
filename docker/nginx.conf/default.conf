upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name api.sig.systems _;

    client_max_body_size 50M;  # admite uploads de planos indoor (ver SiteIndoorMapUploadSerializer)

    # Media — archivos subidos (planos indoor), servidos desde el volumen media_data
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — incluye SSE/streaming sin buffering
    location /api/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400;
    }

    # Auth
    location /web-auth/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

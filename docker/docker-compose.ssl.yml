# ─────────────────────────────────────────────────────────────
#  SIG Platform — HTTPS overlay for the LOCAL PRODUCTION MIRROR
#
#  Serves the stack over TLS with self-signed certs so the app runs
#  with its REAL production settings (Secure cookies + HSTS need
#  HTTPS). Stack on top of the mirror overlay:
#
#    docker compose -f docker/docker-compose.yml \
#                   -f docker/docker-compose.local.yml \
#                   -f docker/docker-compose.ssl.yml up -d
#
#  Generate the cert once (see docs/LOCAL_MIRROR.md):
#    openssl req -x509 -nodes -newkey rsa:2048 -days 825 \
#      -keyout docker/certs/localhost.key -out docker/certs/localhost.crt \
#      -subj "/CN=localhost" \
#      -addext "subjectAltName=DNS:localhost,DNS:api.sig.systems,IP:127.0.0.1"
#
#  Access at https://localhost  (the browser will warn — self-signed).
#  DO NOT use in production (production uses a real CA cert).
# ─────────────────────────────────────────────────────────────
services:
  nginx:
    ports:
      - "443:443"
    volumes:
      # Replace the HTTP-only default.conf (same target path) with the TLS config.
      - ./nginx.conf/ssl.conf:/etc/nginx/conf.d/default.conf:ro
